<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
      <linearGradient id="bodyGrad" x1="0.2" y1="0" x2="0.8" y2="1">
          <stop offset="0%" stop-color="#eaf4fa"/>
          <stop offset="100%" stop-color="#c0d4e4"/>
    </linearGradient>
      <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e65100"/>
          <stop offset="30%" stop-color="#ff6b35"/>
          <stop offset="70%" stop-color="#ffca28"/>
          <stop offset="100%" stop-color="#ffca28" stop-opacity="0"/>
    </linearGradient>
      <clipPath id="bodyClip">
          <path
              d="M 256 110 C 200 140 180 210 180 264 L 180 370 C 180 400 196 416 210 420 C 228 424 284 424 302 420 C 316 416 332 400 332 370 L 332 264 C 332 210 312 140 256 110 Z"/>
      </clipPath>
      <path id="star4" d="M 0,-14 Q 0,0 14,0 Q 0,0 0,14 Q 0,0 -14,0 Q 0,0 0,-14 Z"/>
  </defs>

    <g transform="translate(256 256) scale(1.28) rotate(45) translate(-256 -320)">
        <!-- Stars -->
        <use href="#star4" transform="translate(170, 200) scale(0.55)" fill="#ffca28" opacity="0.85"/>
        <use href="#star4" transform="translate(350, 200) scale(0.4)" fill="#ffca28" opacity="0.7"/>
        <use href="#star4" transform="translate(380, 320) scale(0.6)" fill="#ffca28" opacity="0.9"/>
        <use href="#star4" transform="translate(130, 320) scale(0.45)" fill="#ffca28" opacity="0.75"/>
        <use href="#star4" transform="translate(360, 440) scale(0.35)" fill="#ffca28" opacity="0.65"/>
        <use href="#star4" transform="translate(140, 440) scale(0.5)" fill="#ffca28" opacity="0.8"/>

        <!-- Flame -->
        <path d="M 202 420 C 188 460 210 505 256 530 C 302 505 324 460 310 420 Z" fill="url(#flameGrad)"
              opacity="0.85"/>
        <path d="M 218 420 C 210 450 228 485 256 505 C 284 485 302 450 294 420 Z" fill="#ffca28" opacity="0.9"/>
        <path d="M 236 420 C 232 440 242 465 256 478 C 270 465 280 440 276 420 Z" fill="#fff8e1" opacity="0.85"/>

        <!-- Left fin -->
        <path d="M 180 310 Q 132 410 148 452 L 210 420 Z" fill="#e74c3c"/>
        <path d="M 180 310 Q 160 380 168 452 L 210 420 Z" fill="#ffffff" opacity="0.12"/>

        <!-- Right fin -->
        <path d="M 332 310 Q 380 410 364 452 L 302 420 Z" fill="#e74c3c"/>
        <path d="M 332 310 Q 352 380 344 452 L 302 420 Z" fill="#ffffff" opacity="0.12"/>

        <!-- Rocket body -->
        <path
            d="M 256 110 C 200 140 180 210 180 264 L 180 370 C 180 400 196 416 210 420 C 228 424 284 424 302 420 C 316 416 332 400 332 370 L 332 264 C 332 210 312 140 256 110 Z"
            fill="url(#bodyGrad)" stroke="#90a8b8" stroke-width="1.5"/>

        <!-- Nose cone (red, short) -->
        <rect x="0" y="110" width="512" height="62" fill="#e74c3c" clip-path="url(#bodyClip)"/>

        <!-- Nose cone highlight -->
        <path d="M 256 110 C 220 135 206 170 200 195 L 256 200 L 256 110 Z"
              fill="#ffffff" opacity="0.25" clip-path="url(#bodyClip)"/>

        <!-- Body left highlight -->
        <path d="M 182 264 L 182 370 C 182 400 198 416 210 420 L 218 420 L 218 264 Z"
              fill="#ffffff" opacity="0.35"/>

        <!-- Center fin (edge-on, in front of body) -->
        <path d="M 240 360 L 256 480 L 272 360 Z" fill="#a93226"/>
        <path d="M 245 360 L 256 462 L 267 360 Z" fill="#c0392b"/>
        <path d="M 249 360 L 256 448 L 263 360 Z" fill="#e74c3c" opacity="0.4"/>

        <!-- Window outer -->
        <circle cx="256" cy="250" r="34" fill="#2c3e50"/>
        <circle cx="256" cy="250" r="29" fill="#34495e"/>

        <!-- Window glass -->
        <circle cx="256" cy="250" r="23" fill="#1a5276"/>

        <!-- Window reflection -->
        <ellipse cx="249" cy="243" rx="11" ry="7" fill="#85c1e9" opacity="0.6"/>
    </g>
</svg>
