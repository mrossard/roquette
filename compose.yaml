
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      SERVER_NAME: ':80'
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-roquette}?serverVersion=16&charset=utf8}
      MERCURE_URL: ${MERCURE_URL:-http://127.0.0.1/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-https://localhost/.well-known/mercure}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:  ${POSTGRES_DB:-roquette}
      POSTGRES_USER:  ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD:-'ChangeMe!}
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  caddy_data:
  caddy_config:
  db_data:
  clamav_data:
  minio_data:

