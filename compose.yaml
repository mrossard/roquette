
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      SERVER_NAME: ':80'
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-roquette}?serverVersion=16&charset=utf8}
      MERCURE_URL: ${MERCURE_URL:-http://127.0.0.1/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-https://localhost/.well-known/mercure}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310

  database:
    image: pgvector/pgvector:0.8.0-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:  ${POSTGRES_DB:-roquette}
      POSTGRES_USER:  ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD:-!ChangeMe!}
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    platform: linux/amd64
    volumes:
      - clamav_data:/var/lib/clamav

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadminpassword; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/roquette-uploads;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull-model:
    image: curlimages/curl:latest
    entrypoint: [ "sh", "-c", "until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 1; done; curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:3b\"}' && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}'" ]
    depends_on:
      - ollama

volumes:
  caddy_data:
  caddy_config:
  db_data:
  clamav_data:
  minio_data:
  ollama_data:
