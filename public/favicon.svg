<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="rocket-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="fire-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg-grad)" />
  
  <!-- Outer glowing ring -->
  <rect x="6" y="6" width="116" height="116" rx="22" fill="none" stroke="url(#accent-grad)" stroke-width="2.5" opacity="0.3" />

  <!-- Fire trail / flame -->
  <path d="M64 90 C54 90, 48 108, 64 122 C80 108, 74 90, 64 90 Z" fill="url(#fire-grad)" />
  <path d="M64 95 C58 95, 54 108, 64 116 C74 108, 70 95, 64 95 Z" fill="#fbbf24" />

  <!-- Left Fin -->
  <path d="M50 75 L30 90 C30 90, 36 70, 44 65 Z" fill="url(#accent-grad)" />
  <!-- Right Fin -->
  <path d="M78 75 L98 90 C98 90, 92 70, 84 65 Z" fill="url(#accent-grad)" />

  <!-- Rocket Body -->
  <path d="M64 18 C78 45, 80 75, 76 90 L52 90 C48 75, 50 45, 64 18 Z" fill="url(#rocket-grad)" />
  
  <!-- Rocket nose cone -->
  <path d="M64 18 C71 31, 74 44, 74 48 L54 48 C54 44, 57 31, 64 18 Z" fill="url(#accent-grad)" />

  <!-- Window -->
  <circle cx="64" cy="58" r="10" fill="#f8fafc" />
  <circle cx="64" cy="58" r="7" fill="#38bdf8" opacity="0.6" />
</svg>
