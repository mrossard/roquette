[supervisord]
nodaemon=true

[program:frankenphp]
priority=1
command=frankenphp run --config /app/docker/Caddyfile
numprocs=1
startsecs=0
autostart=true
autorestart=true
startretries=10
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:messenger-consume-high]
priority=5
command=php /app/bin/console messenger:consume async_high --limit=50 --memory-limit=128M
numprocs=2
autostart=true
autorestart=true
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:messenger-consume-low]
priority=6
command=php /app/bin/console messenger:consume async_low --limit=50 --memory-limit=128M
numprocs=2
stopwaitsecs=310
autostart=true
autorestart=true
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:scheduler]
command=php /app/bin/console messenger:consume scheduler_default --limit 5 --memory-limit=128M
numprocs=1
startsecs=0
autostart=true
autorestart=true
startretries=10
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
