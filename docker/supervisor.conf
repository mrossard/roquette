[supervisord]
nodaemon=true

[program:frankenphp]
priority=1
command=frankenphp run --config /app/docker/Caddyfile
numprocs=1
startsecs=0
autostart=true
autorestart=true
startretries=10
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:messenger-consume]
priority=5
command=php /app/bin/console messenger:consume async --limit=50 --memory-limit=128M
numprocs=2
autostart=true
autorestart=true
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
